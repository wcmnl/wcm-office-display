<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta http-equiv="refresh" content="3600">
<title>We Can Marketing â€” Office Display</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --teal:      #1B7A8A;
    --gold:      #F5A200;
    --navy:      #0B1520;
    --navy-card: #111f2e;
    --text:      #FFFFFF;
    --muted:     #7A9DB0;
    --border:    rgba(27,122,138,0.3);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100vw; height:100vh; background:var(--navy); color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; display:flex; flex-direction:column; }

  /* HEADER */
  header {
    display:grid; grid-template-columns:auto 1fr auto;
    align-items:center; background:var(--navy-card);
    border-bottom:2px solid var(--gold);
    padding:0 20px; height:90px; flex-shrink:0; gap:12px;
  }
  .hdr-logo { display:flex; align-items:center; gap:10px; }
  .hdr-logo img { height:62px; width:auto; display:block; }
  .hdr-logo-fallback { font-size:18px; font-weight:800; color:var(--text); }
  .hdr-logo-fallback span { color:var(--gold); }

  .hdr-center { text-align:center; }
  .hdr-time { font-size:38px; font-weight:300; letter-spacing:3px; line-height:1; }
  .hdr-date { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }

  .hdr-right { display:flex; align-items:stretch; height:100%; }

  /* Compact weer in header */
  .hdr-weather {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 16px; border-left:1px solid var(--border); height:100%; text-align:center;
  }
  .hdr-weather-row { display:flex; align-items:center; gap:5px; }
  .hdr-wicon { font-size:24px; }
  .hdr-wtemp { font-size:24px; font-weight:300; }
  .hdr-wlabel { font-size:8px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

  /* Analoge klokken */
  .hdr-clocks { display:flex; align-items:stretch; }
  .hdr-clock-wrap {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 11px; border-left:1px solid var(--border); gap:4px; min-width:72px;
  }
  .hdr-clock-wrap.local { background:rgba(27,122,138,0.13); }
  .hdr-clock-wrap.local canvas { filter:drop-shadow(0 0 4px rgba(27,122,138,0.7)); }
  .hdr-clock-meta { display:flex; align-items:center; gap:3px; }
  .hdr-clock-flag { font-size:11px; line-height:1; }
  .hdr-clock-city { font-size:7px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }

  /* TICKER */
  .ticker-bar { display:flex; align-items:center; background:var(--navy-card);
    border-bottom:1px solid var(--border); height:30px; flex-shrink:0; overflow:hidden; }
  .ticker-label { background:var(--gold); color:var(--navy); font-size:9px; font-weight:800;
    letter-spacing:2px; text-transform:uppercase; padding:0 12px; height:100%;
    display:flex; align-items:center; flex-shrink:0; white-space:nowrap; }
  .ticker-track { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
  .ticker-inner { display:flex; align-items:center; white-space:nowrap;
    animation:ticker-scroll 60s linear infinite; }
  .ticker-inner:hover { animation-play-state:paused; }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item { font-size:12px; color:var(--text); padding:0 26px 0 0; }
  .ticker-sep  { color:var(--gold); font-size:12px; margin-right:26px; }

  /* MAIN */
  .main { display:grid; grid-template-columns:30% 1fr 26%; gap:10px; padding:10px 10px 14px 10px; flex:1; min-height:0; }
  .right-col { display:grid; grid-template-rows:1fr 1fr; gap:10px; min-height:0; }

  /* PANELS */
  .panel { background:var(--navy-card); border:1px solid var(--border); border-radius:8px;
    overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  .panel-header { display:flex; align-items:center; gap:8px; padding:8px 14px;
    background:rgba(27,122,138,0.15); border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-header h2 { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--teal); }
  .panel-dot { width:6px; height:6px; background:var(--gold); border-radius:50%; flex-shrink:0; }

  /* PARTNERS */
  .partners-body { flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:20px 24px; min-height:0; }
  .partner-card { display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; height:100%; animation:fadeIn 0.6s ease; }
  .partner-card.active { display:flex; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .partner-logo-wrap { width:clamp(80px,8vw,140px); height:clamp(80px,8vw,140px); background:#fff; border-radius:18px;
    display:flex; align-items:center; justify-content:center; margin-bottom:clamp(12px,1.5vh,24px);
    overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.4); flex-shrink:0; }
  .partner-logo-wrap img { width:75%; height:75%; object-fit:contain; }
  .partner-logo-fallback { width:75%; height:75%; background:var(--teal); border-radius:14px;
    display:flex; align-items:center; justify-content:center; font-size:clamp(20px,2.5vw,40px); font-weight:800; color:#fff; }
  .partner-name   { font-size:clamp(18px,2.2vw,36px); font-weight:800; line-height:1.1; margin-bottom:clamp(4px,0.6vh,10px); }
  .partner-domain { font-size:clamp(9px,0.8vw,13px); letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:clamp(8px,1vh,16px); }
  .partner-desc   { font-size:clamp(11px,1vw,17px); color:var(--muted); line-height:1.6; max-width:min(360px,90%); }
  .partner-nav    { display:flex; justify-content:center; gap:6px; padding:10px; flex-shrink:0; }
  .partner-dot    { width:6px; height:6px; border-radius:50%; background:var(--navy);
    border:1px solid var(--teal); cursor:pointer; transition:background 0.3s; }
  .partner-dot.active { background:var(--gold); border-color:var(--gold); }

  /* TRAFFIC */
  .traffic-body { flex:1; min-height:0; position:relative; display:flex; flex-direction:column; }
  #traffic-map { flex:1; min-height:0; width:100%; }
  .traffic-overlay { position:absolute; bottom:36px; right:8px; background:rgba(11,21,32,0.85);
    border:1px solid var(--border); border-radius:4px; padding:4px 10px;
    font-size:10px; color:var(--muted); letter-spacing:1px; z-index:500; }
  .traffic-ticker { height:28px; background:rgba(231,76,60,0.12); border-top:1px solid rgba(231,76,60,0.35);
    display:flex; align-items:center; overflow:hidden; flex-shrink:0; }
  .traffic-ticker-label { font-size:8px; font-weight:800; color:#E74C3C; text-transform:uppercase;
    letter-spacing:1.5px; padding:0 10px; white-space:nowrap; border-right:1px solid rgba(231,76,60,0.3); flex-shrink:0; }
  .traffic-ticker-track { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
  .traffic-ticker-inner { display:flex; align-items:center; white-space:nowrap;
    animation:traffic-scroll 30s linear infinite; gap:0; }
  .traffic-ticker-inner:hover { animation-play-state:paused; }
  @keyframes traffic-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .traffic-item { display:inline-flex; align-items:center; gap:6px; padding:0 20px;
    border-right:1px solid rgba(231,76,60,0.2); font-size:10px; color:var(--text); }
  .traffic-item-road { font-weight:800; color:#E74C3C; font-size:11px; min-width:28px; }
  .traffic-item-km { color:var(--gold); font-weight:600; }
  .traffic-item-sep { color:rgba(231,76,60,0.4); margin:0 16px; }

  /* SLIDESHOW */
  .slideshow-body { flex:1; position:relative; overflow:hidden; min-height:0; background:#080f18; }
  .slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity 1.2s ease; }
  .slide.active { opacity:1; }
  .slide img { width:100%; height:100%; object-fit:cover; }
  .slide-placeholder {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); text-align:center; gap:12px; width:100%; height:100%;
  }
  .slide-ph-icon { font-size:36px; opacity:0.35; }
  .slide-ph-title { font-size:13px; font-weight:600; color:var(--text); opacity:0.5; letter-spacing:1px; }
  .slide-ph-sub { font-size:10px; opacity:0.4; line-height:1.7; }
  .slide-counter { position:absolute; bottom:10px; right:14px; font-size:10px;
    color:rgba(255,255,255,0.35); letter-spacing:1px; }

  /* EVENTS */
  .events-body { flex:1; display:flex; flex-direction:column; gap:0; overflow:hidden; min-height:0; }
  .event-item { display:flex; align-items:center; gap:10px; padding:8px 14px;
    border-bottom:1px solid var(--border); transition:background 0.3s; flex-shrink:0; }
  .event-item:last-child { border-bottom:none; }
  .event-item.today { background:rgba(245,162,0,0.08); border-left:3px solid var(--gold); padding-left:11px; }
  .event-item.soon  { background:rgba(27,122,138,0.07); }
  .event-icon  { font-size:20px; flex-shrink:0; width:28px; text-align:center; }
  .event-info  { flex:1; min-width:0; }
  .event-label { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .event-when  { font-size:10px; color:var(--muted); margin-top:1px; letter-spacing:.5px; }
  .event-badge { font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    padding:2px 6px; border-radius:3px; flex-shrink:0; }
  .badge-verjaardag { background:rgba(245,162,0,0.2); color:var(--gold); }
  .badge-feestdag   { background:rgba(27,122,138,0.2); color:var(--teal); }
  .badge-event      { background:rgba(255,255,255,0.08); color:var(--muted); }

  /* KLANTEN TICKER */
  .clients-bar { display:flex; align-items:center; background:#ffffff;
    border-top:1px solid #e0e0e0; height:59px; flex-shrink:0; overflow:hidden; }
  .clients-label { background:#f5f5f5; color:var(--teal); font-size:8px; font-weight:800;
    letter-spacing:2px; text-transform:uppercase; padding:0 14px; height:100%;
    display:flex; align-items:center; flex-shrink:0; white-space:nowrap;
    border-right:1px solid #e0e0e0; min-width:80px; justify-content:center; }
  .clients-track { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
  .clients-inner { display:flex; align-items:center; white-space:nowrap;
    animation:clients-scroll 40s linear infinite; gap:0; }
  .clients-inner:hover { animation-play-state:paused; }
  @keyframes clients-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .client-logo-wrap { display:flex; align-items:center; justify-content:center;
    width:120px; height:38px; padding:0 16px; border-right:1px solid #ebebeb; flex-shrink:0; box-sizing:border-box; }
  .client-logo-wrap img { width:88px; height:30px; object-fit:contain;
    opacity:0.9; transition:opacity 0.3s; image-rendering:auto; }
  .client-logo-wrap img:hover { opacity:1; }
  .client-logo-placeholder { font-size:11px; font-weight:700; color:#999;
    letter-spacing:1px; text-transform:uppercase; }

  /* FOOTER WEER */
  footer {
    background:var(--navy-card); border-top:2px solid var(--teal);
    display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr;
    gap:1px; background-color:var(--border);
    height:79px; flex-shrink:0; margin-bottom:19px;
  }
  .fw-cell { background:var(--navy-card); display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:6px 8px; }
  .fw-cell.now { border-left:3px solid var(--teal); }
  .fw-icon  { font-size:16px; margin-bottom:1px; }
  .fw-label { font-size:8px; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:1px; }
  .fw-temp  { font-size:18px; font-weight:300; line-height:1; }
  .fw-feels { font-size:8px; color:var(--muted); margin-top:1px; }
  .fw-wind  { font-size:8px; color:var(--muted); margin-top:1px; }
  .fw-day-name { font-size:8px; font-weight:700; color:var(--teal); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
  .fw-temps { display:flex; gap:4px; align-items:baseline; margin-top:1px; }
  .fw-max   { font-size:15px; font-weight:600; }
  .fw-min   { font-size:11px; color:var(--muted); }
  .fw-cond  { font-size:8px; color:var(--muted); margin-top:1px; }
  .fw-rain  { font-size:8px; color:#6ab0c8; }
</style>
</head>

const CLOCK_SIZE = 54;

function drawClock(canvas, tz) {
  const ctx = canvas.getContext('2d');
  const S = CLOCK_SIZE, cx = S/2, cy = S/2, r = S/2 - 2;
  const now = new Date();

  // Haal tijdsdelen op via Intl
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour:'numeric', minute:'numeric', second:'numeric', hour12:false
  });
  let h=0, m=0, s=0;
  fmt.formatToParts(now).forEach(p => {
    if (p.type==='hour')   h = parseInt(p.value) % 24;
    if (p.type==='minute') m = parseInt(p.value);
    if (p.type==='second') s = parseInt(p.value);
  });

  ctx.clearRect(0, 0, S, S);

  // Wijzerplaat achtergrond
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2*Math.PI);
  ctx.fillStyle = '#0d1c2e';
  ctx.fill();
  ctx.strokeStyle = '#1B7A8A';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Uurmarkeringen + cijfers op 12, 3, 6, 9
  const hourLabels = {0:'12', 3:'3', 6:'6', 9:'9'};
  for (let i=0; i<12; i++) {
    const a = (i/12)*2*Math.PI - Math.PI/2;
    const isMajor = i%3===0;
    const r1 = r - 2;
    const r2 = r1 - (isMajor ? 6 : 4);
    ctx.beginPath();
    ctx.moveTo(cx + r1*Math.cos(a), cy + r1*Math.sin(a));
    ctx.lineTo(cx + r2*Math.cos(a), cy + r2*Math.sin(a));
    ctx.strokeStyle = isMajor ? '#F5A200' : 'rgba(27,122,138,0.6)';
    ctx.lineWidth = isMajor ? 1.8 : 1;
    ctx.stroke();
    if (hourLabels[i] !== undefined) {
      const tr = r - 14;
      ctx.font = 'bold 7px Segoe UI,sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(hourLabels[i], cx + tr*Math.cos(a), cy + tr*Math.sin(a));
    }
  }

  // Uurwijzer
  const hAngle = ((h%12)/12 + m/720)*2*Math.PI - Math.PI/2;
  ctx.beginPath();
  ctx.moveTo(cx - 3*Math.cos(hAngle), cy - 3*Math.sin(hAngle));
  ctx.lineTo(cx + (r*0.48)*Math.cos(hAngle), cy + (r*0.48)*Math.sin(hAngle));
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Minuutwijzer
  const mAngle = (m/60 + s/3600)*2*Math.PI - Math.PI/2;
  ctx.beginPath();
  ctx.moveTo(cx - 3*Math.cos(mAngle), cy - 3*Math.sin(mAngle));
  ctx.lineTo(cx + (r*0.70)*Math.cos(mAngle), cy + (r*0.70)*Math.sin(mAngle));
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Secondenwijzer
  const sAngle = (s/60)*2*Math.PI - Math.PI/2;
  ctx.beginPath();
  ctx.moveTo(cx - 5*Math.cos(sAngle), cy - 5*Math.sin(sAngle));
  ctx.lineTo(cx + (r*0.82)*Math.cos(sAngle), cy + (r*0.82)*Math.sin(sAngle));
  ctx.strokeStyle = '#F5A200';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Middelpunt
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, 2*Math.PI);
  ctx.fillStyle = '#F5A200';
  ctx.fill();
}

function buildClocks() {
  const el = document.getElementById('hdr-clocks');
  el.innerHTML = CLOCKS.map(c => {
    const id = 'canvas-' + c.tz.replace(/\//g,'-');
    return '<div class="hdr-clock-wrap' + (c.local?' local':'') + '">'
      + '<canvas id="' + id + '" width="' + CLOCK_SIZE + '" height="' + CLOCK_SIZE + '"></canvas>'
      + '<div class="hdr-clock-meta">'
      + '<span class="hdr-clock-flag">' + c.flag + '</span>'
      + '<span class="hdr-clock-city">' + c.city + '</span>'
      + '</div></div>';
  }).join('');
  CLOCKS.forEach(c => {
    const cvs = document.getElementById('canvas-' + c.tz.replace(/\//g,'-'));
    if (cvs) drawClock(cvs, c.tz);
  });
}

function updateClocks() {
  const now = new Date();
  const t = new Intl.DateTimeFormat('nl-NL',{timeZone:'Europe/Amsterdam',hour:'2-digit',minute:'2-digit'}).format(now);
  const d = new Intl.DateTimeFormat('nl-NL',{timeZone:'Europe/Amsterdam',weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(now);
  document.getElementById('hdr-time').textContent = t;
  document.getElementById('hdr-date').textContent = d.charAt(0).toUpperCase()+d.slice(1);
  CLOCKS.forEach(c => {
    const cvs = document.getElementById('canvas-' + c.tz.replace(/\//g,'-'));
    if (cvs) drawClock(cvs, c.tz);
  });
}

let currentPartner = 0;
function buildPartners() {
  const body = document.getElementById('partners-body');
  const nav  = document.getElementById('partner-nav');
  body.innerHTML = PARTNERS.map((p,i) =>
    '<div class="partner-card' + (i===0?' active':'') + '" id="partner-'+i+'">'
    + '<div class="partner-logo-wrap">'

function showPartner(idx) {
  document.querySelectorAll('.partner-card').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.partner-dot').forEach(e=>e.classList.remove('active'));
  document.getElementById('partner-'+idx).classList.add('active');
  document.getElementById('pdot-'+idx).classList.add('active');
  currentPartner = idx;
}
function nextPartner() { showPartner((currentPartner+1)%PARTNERS.length); }

// â”€â”€ WEATHER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function updateWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast'
      +'?latitude=51.9569&longitude=4.4375'
      +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code'
      +'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum'
      +'&wind_speed_unit=kmh&timezone=Europe%2FAmsterdam&forecast_days=4';
    const data = await (await fetch(url)).json();
    const c = data.current, d = data.daily;
    if (!c || !d || !d.time || d.time.length < 4) throw new Error('onvoldoende weerdata');
    const wmo  = WMO[c.weather_code]||{icon:'\uD83C\uDF21\uFE0F',label:'Onbekend'};
    const wdir = WIND_DIRS[Math.round(c.wind_direction_10m/22.5)%16];
    const hdrIcon = document.getElementById('hdr-wicon'); if(hdrIcon) hdrIcon.textContent = wmo.icon;
    const hdrTemp = document.getElementById('hdr-wtemp'); if(hdrTemp) hdrTemp.textContent = Math.round(c.temperature_2m)+'\u00B0';
    const dagen = ['zo','ma','di','wo','do','vr','za'];
    const fc = [1,2,3].map(i => {
      const dt = new Date(d.time[i]+'T12:00:00');
      const mm = (d.precipitation_sum && d.precipitation_sum[i] != null) ? d.precipitation_sum[i] : 0;
      const maxT = d.temperature_2m_max[i] != null ? Math.round(d.temperature_2m_max[i]) : '--';
      const minT = d.temperature_2m_min[i] != null ? Math.round(d.temperature_2m_min[i]) : '--';
      return { naam:i===1?'Morgen':dagen[dt.getDay()].toUpperCase(),
        wmo:WMO[d.weather_code[i]]||{icon:'\uD83C\uDF21\uFE0F',label:''},
        max:maxT, min:minT, mm:mm };
    });
    document.getElementById('weather-footer').innerHTML =
      '<div class="fw-cell now">'
      +'<div class="fw-icon">'+wmo.icon+'</div>'
      +'<div class="fw-label">'+wmo.label+'</div>'
      +'<div class="fw-temp">'+Math.round(c.temperature_2m)+'\u00B0</div>'
      +'<div class="fw-feels">Voelt als '+Math.round(c.apparent_temperature)+'\u00B0</div>'
      +'<div class="fw-wind">\uD83D\uDCA8 '+Math.round(c.wind_speed_10m)+' km/h '+wdir+' \u00B7 \uD83D\uDCA7'+c.relative_humidity_2m+'%</div>'
      +'</div>'
      + fc.map(f =>
          '<div class="fw-cell">'
          +'<div class="fw-day-name">'+f.naam+'</div>'
          +'<div class="fw-icon">'+f.wmo.icon+'</div>'
          +'<div class="fw-temps"><span class="fw-max">'+f.max+'\u00B0</span><span class="fw-min">'+f.min+'\u00B0</span></div>'
          +'<div class="fw-cond">'+f.wmo.label+'</div>'
          +(f.mm>0?'<div class="fw-rain">\uD83C\uDF27 '+(+f.mm).toFixed(1)+' mm</div>':'')
          +'</div>'
        ).join('');
  } catch(e) { const el=document.getElementById('weather-footer'); if(el) el.innerHTML='<div class="fw-cell now" style="grid-column:1/-1">\u26A0\uFE0F Weer tijdelijk niet beschikbaar</div>'; }
}

// â”€â”€ TICKER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function loadNewsTicker() {
  const feeds = [
    'https://feeds.nos.nl/nosnieuwsalgemeen',
    'https://feeds.nos.nl/nosnieuws',
    'https://www.nu.nl/rss/algemeen'
  ];
  for (const feed of feeds) {
    try {
      const url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed);
      const res = await fetch(url, {cache:'no-store'});
      if (!res.ok) continue;
      const json = await res.json();
      if (json.status !== 'ok' || !json.items || !json.items.length) continue;
      const titles = json.items.slice(0,20).map(i=>i.title).filter(Boolean);
      if (!titles.length) continue;
      const h = titles.map(t=>'<span class="ticker-item">'+t+'</span><span class="ticker-sep">\u25C6</span>').join('');
      const el = document.getElementById('ticker-inner');
      el.innerHTML = h+h;
      el.style.animationDuration = Math.max(50, titles.reduce((s,t)=>s+t.length,0)*0.16)+'s';
      return;
    } catch(e) {}
  }
  // Fallback: toon statisch bericht
  document.getElementById('ticker-inner').innerHTML =
    '<span class="ticker-item">nos.nl \u00B7 nieuws.nl \u00B7 nu.nl</span>';
}

// â”€â”€ VERKEERSKAART (statische NDW data, ingebakken bij rebuild) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let trafficMap=null;
function initTrafficMap() {
  const nl=[[50.75,3.36],[53.55,7.23]];
  trafficMap=L.map('traffic-map',{zoomControl:false,attributionControl:false,maxBounds:nl,maxBoundsViscosity:1.0,minZoom:7});
  trafficMap.fitBounds(nl,{padding:[4,4]});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(trafficMap);
  L.control.attribution({prefix:false,position:'bottomleft'}).addAttribution('\u00A9 CARTO \u00B7 NDW').addTo(trafficMap);
  L.control.zoom({position:'bottomright'}).addTo(trafficMap);
  const statusEl=document.getElementById('traffic-status');
  NDW_INCIDENTS.forEach(item=>{
    if (item.type === 'line' && item.coords.length >= 2) {
      // File: gestippelde polyline
      L.polyline(item.coords, {
        color: item.color, weight: 5, opacity: 0.9,
        dashArray: '10, 7', lineCap: 'round', lineJoin: 'round'
      }).bindPopup(item.desc).addTo(trafficMap);
      // Klein startpunt als ankerpunt
      L.circleMarker(item.coords[0], {
        radius:4, fillColor:item.color, color:'#0B1520', weight:1, fillOpacity:1
      }).addTo(trafficMap);
    } else {
      // Ongeluk: cirkelmarker
      L.circleMarker(item.coords[0], {
        radius:7, fillColor:item.color, color:'#0B1520', weight:2, fillOpacity:0.95
      }).bindPopup(item.desc).addTo(trafficMap);
    }
  });
  statusEl.textContent = NDW_INCIDENTS.length + ' files \u00B7 NDW';

  // â”€â”€ Traffic ticker vullen â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const ticker = document.getElementById('traffic-ticker-inner');
  if (ticker && NDW_INCIDENTS.length) {
    // Toon elke file afzonderlijk, sorteer op snelwegnummer dan km
    const sorted = NDW_INCIDENTS
      .filter(i => i.type === 'line')
      .sort((a,b) => (a.road||'').localeCompare(b.road||'') || (b.km||0)-(a.km||0));
    const html = sorted.map(item => {
      const road  = item.road ? '<span class="traffic-item-road">' + item.road + '</span>' : '';
      const kmTxt = item.km  ? '<span class="traffic-item-km">'   + (+item.km).toFixed(1) + ' km</span>' : '';
      return '<div class="traffic-item">' + road + kmTxt + '</div>';
    }).join('<span class="traffic-item-sep">\u25CF</span>');
    ticker.innerHTML = html + html;
    const dur = Math.max(20, sorted.length * 3);
    ticker.style.animationDuration = dur + 's';
  } else if (ticker) {
    ticker.innerHTML = '<div class="traffic-item" style="color:var(--muted)">Geen actuele files \u2713</div>';
    ticker.style.animation = 'none';
  }
}

function buildEvents() {
  const body = document.getElementById('events-body');
  if (!EVENTS.length) {
    body.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:12px;text-align:center;">Geen aankomende evenementen</div>';
    return;
  }
  body.innerHTML = EVENTS.map(e => {
    const cls = e.diff === 0 ? 'today' : e.diff <= 3 ? 'soon' : '';
    const badgeCls = 'badge-' + e.type;
    const badge = e.type !== 'event' ? '<span class="event-badge '+badgeCls+'">'+e.type+'</span>' : '';
    return '<div class="event-item '+cls+'">'
      + '<div class="event-icon">'+e.icon+'</div>'
      + '<div class="event-info">'
      + '<div class="event-label">'+e.label+'</div>'
      + '<div class="event-when">'+e.when+'</div>'
      + '</div>'
      + badge
      + '</div>';
  }).join('');
}
